<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Product | Smartzonelk</title>

  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{ --red:#e11d2e; --red-dark:#b50d1f; --black:#0a0a0a; --black-2:#111; --text:#f2f2f2; }
    html,body{ background:var(--black); color:var(--text); }
    body{ font-family:'Montserrat',system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; }
    a{ color:var(--red); } a:hover{ color:var(--red-dark); }

    /* Header (same as home page) */
    .nav-rounded{
      position: fixed; top:16px; left:50%; transform:translate(-50%,0);
      width: calc(100% - 32px); border-radius:16px; border:1px solid #1f1f1f; border-bottom:3px solid var(--red);
      background: linear-gradient(180deg, rgba(18,18,18,0.98), rgba(10,10,10,0.98));
      box-shadow:0 10px 30px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05);
      padding:.35rem 0; z-index:1055; overflow:hidden; transition:transform .22s ease-in-out; will-change:transform;
    }
    .nav-hidden{ transform: translate(-50%, -140%); }
    .nav-spacer{ height:88px; }

    .navbar .navbar-brand{ color:#fff !important; font-weight:700; letter-spacing:.2px; padding:0; }
    .navbar .nav-link{ color:#ddd !important; padding:.5rem .8rem; border-radius:.6rem; transition:all .18s ease; }
    .navbar .nav-link:hover{ color:#fff !important; background:rgba(225,29,46,.12); }
    .navbar .nav-link.active{ color:#fff !important; background:rgba(225,29,46,.24); }
    .navbar .navbar-toggler{ border-color: rgba(255,255,255,.25); }
    .navbar .navbar-toggler-icon{
      background-image:url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(255,255,255,0.9)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
    }
    @media (min-width: 992px){
      .navbar .navbar-nav{
        display:grid !important;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap:.25rem 1.25rem; width:100%; max-width:780px; margin:0 auto; align-items:center;
      }
      .navbar .nav-item{ text-align:center; }
    }
    @media (max-width: 991.98px){
      .nav-rounded .navbar-collapse{
        background:rgba(15,15,15,.98); border-top:1px solid #1f1f1f; margin-top:.45rem; border-radius:0 0 12px 12px; padding:.5rem .25rem .75rem;
      }
    }

    .container{ max-width:1100px; }
    .card{ background:var(--black-2); border:1px solid #1f1f1f; border-radius:12px; overflow:hidden; }
    .thumb{ width:100%; aspect-ratio:16/10; object-fit:cover; display:block; background:#000; }

    /* Price text with red LKR */
    .price-tag{
      display:inline-flex; align-items:baseline; gap:.4rem;
      font-weight:800; font-size:1.05rem; letter-spacing:.2px;
    }
    .price-tag .currency{ color:var(--red); font-weight:900; }
    .price-tag .amount{ color:#fff; font-weight:800; }

    .chip{
      display:inline-block; background:#1b1b1b; color:#ddd;
      border:1px solid #2a2a2a; padding:.2rem .5rem; border-radius:.5rem;
      margin-left:.5rem; font-size:.85rem;
    }

    .product-details{ margin-top:1rem; }
    .product-details p{ margin:.35rem 0; }
    .product-details ul{ margin:.25rem 0 .6rem; padding-left:1.2rem; }
    .product-details ul.check-list{ list-style:none; padding-left:0; }
    .product-details li{ margin:.2rem 0; }

    .btn-danger{ background:var(--red) !important; border-color:var(--red) !important; }
    .btn-danger:hover{ background:var(--red-dark) !important; border-color:var(--red-dark) !important; }

    /* Modal dark theme */
    .modal-content{ background:#151515; color:#fff; border:1px solid #222; }
    .form-control, .form-select{ background:#101010; color:#fff; border-color:#2a2a2a; }
    .form-control::placeholder{ color:#777; }
  </style>
</head>
<body>
  <!-- Header -->
  <nav class="navbar navbar-expand-lg navbar-dark shadow nav-rounded">
    <div class="container">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <a class="navbar-brand" href="index.html">Smartzonelk</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Products</a></li>
          <!-- Services removed -->
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">Help</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="nav-spacer"></div>

  <main class="py-4 py-md-5">
    <div class="container">
      <div id="content"></div>
    </div>
  </main>

  <!-- Buy Now Modal -->
  <div class="modal fade" id="buyModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0">
          <h5 class="modal-title">Place Order</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <!-- We will intercept submit and send via Gmail/Email -->
        <form id="orderForm" action="#" method="POST">
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Product</label>
              <input class="form-control" id="productTitle" name="product" readonly>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Price</label>
                <input class="form-control" id="productPrice" name="price" readonly>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Product ID</label>
                <input class="form-control" id="productId" name="product_id" readonly>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Your Name</label>
              <input class="form-control" id="custName" name="name" placeholder="Enter your name" required>
            </div>
            <div class="mb-3">
              <label class="form-label">WhatsApp Number</label>
              <input class="form-control" id="custWhatsapp" name="whatsapp" placeholder="0786800086" inputmode="tel" pattern="[0-9+ ]{9,15}" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Payment Method</label>
              <select class="form-select" id="paymentMethod" name="payment_method" required>
                <option value="Cash on Delivery">Cash on Delivery</option>
                <option value="Bank Payment">Bank Payment</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Notes (optional)</label>
              <textarea class="form-control" id="custNotes" name="notes" rows="2" placeholder="Delivery address / preferred time"></textarea>
            </div>
          </div>
          <div class="modal-footer border-0">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-danger">Send Order</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Header behavior -->
  <script>
    (function(){
      const nav = document.querySelector('.nav-rounded');
      const spacer = document.querySelector('.nav-spacer');
      const collapse = document.getElementById('navbarNav');
      function getTopGap(){ if(!nav) return 0; const cs = getComputedStyle(nav); return parseInt(cs.top) || 0; }
      function updateNavSpacer(){ if(nav && spacer){ spacer.style.height = (nav.offsetHeight + getTopGap()) + 'px'; } }
      let lastY = window.pageYOffset || document.documentElement.scrollTop;
      const thresholdTop = 10, deltaMin = 6;
      function onScroll(){
        if(!nav) return;
        const y = window.pageYOffset || document.documentElement.scrollTop;
        const diff = y - lastY;
        if(collapse && collapse.classList.contains('show')){ nav.classList.remove('nav-hidden'); lastY = y; return; }
        if(diff > deltaMin && y > thresholdTop){ nav.classList.add('nav-hidden'); }
        else if(diff < -deltaMin || y <= thresholdTop){ nav.classList.remove('nav-hidden'); }
        lastY = y <= 0 ? 0 : y;
      }
      window.addEventListener('load', ()=>{ updateNavSpacer(); onScroll(); });
      window.addEventListener('resize', updateNavSpacer, {passive:true});
      window.addEventListener('scroll', onScroll, {passive:true});
      if(collapse){
        collapse.addEventListener('shown.bs.collapse', ()=>{ nav.classList.remove('nav-hidden'); updateNavSpacer(); });
        collapse.addEventListener('hidden.bs.collapse', updateNavSpacer);
      }
    })();
  </script>

  <script>
    function getParam(key){ return new URLSearchParams(location.search).get(key); }
    function loadAll(){
      let all = [];
      try{ all = JSON.parse(localStorage.getItem('allProducts') || '[]'); }catch(e){}
      if(!all.length){
        try{ const a = JSON.parse(localStorage.getItem('sellItems')||'[]'); if(Array.isArray(a)) all=all.concat(a);}catch(e){}
        try{ const b = JSON.parse(localStorage.getItem('simItems') ||'[]'); if(Array.isArray(b)) all=all.concat(b);}catch(e){}
        try{ const c = JSON.parse(localStorage.getItem('batteryItems')||'[]'); if(Array.isArray(c)) all=all.concat(c);}catch(e){}
      }
      return all;
    }
    function colorFromString(str){
      let hash=0; for(let i=0;i<str.length;i++){ hash = str.charCodeAt(i) + ((hash<<5)-hash); hash|=0; }
      const hue = Math.abs(hash)%360; return `hsl(${hue}, 70%, 45%)`;
    }

    (function(){
      const root = document.getElementById('content');

      const id = getParam('id');
      const all = loadAll();
      const item = all.find(p => String(p.id) === String(id));

      if(!item){
        root.innerHTML = `<div class="alert alert-warning">Product not found. <a href="index.html" class="alert-link">Back to Home</a></div>`;
        return;
      }

      document.title = item.title + ' | Smartzonelk';
      const cat = (item.category||'Product').trim();
      const price = Number(item.price)||0;
      const img = item.image || '';
      const tagColor = colorFromString(cat);

      const waMsg = encodeURIComponent(`Hello Smartzonelk, I want to buy: ${item.title} - ${price>0 ? 'LKR ' + price.toFixed(2) : 'Contact for price'}`);
      const waHref = `https://wa.me/94786800086?text=${waMsg}`;

      const priceMarkup = price > 0
        ? `<span class="price-tag"><span class="currency">LKR</span><span class="amount">${price.toFixed(2)}</span></span>`
        : `<span class="price-tag">Contact for price</span>`;

      const titleLC = String(item.title||'').trim().toLowerCase();
      const pid = String(item.id||'');

      /* Your item-specific descriptions (kept from your version) */
      const isDialogCat6 = titleLC === 'dialog 4g+ broadband router (cat6)';
      const isZLT       = titleLC === 'zlt mf293n brand new router' || titleLC.includes('mf293n');
      const isS12Pro    = titleLC === 'slt s12pro brand new router' || titleLC.includes('s12pro');
      const isSLT818H   = titleLC === 'dialog slt818h 4g+ cat6 router' || titleLC.includes('slt818h');
      const isViuHub    = titleLC === 'brand new viu hub smart box' || titleLC.includes('viu hub');
      const isViuRemote = titleLC === 'viu mini tv remote' || titleLC.includes('viu mini');
      const isDialogZeroSIM  = pid === 'sim3' || titleLC.includes('zero sim');
      const isSLTPrePostSIM  = pid === 'sim2' || (titleLC.includes('postpaid') || titleLC.includes('prepaid'));
      const isBatteryZ2600   = pid === 'bat1' || titleLC.includes('z2600');
      const isAAABattery     = pid === 'bat2' || titleLC.includes('aaa');
      const isRouterUnlockSvc    = pid === 'svc1' || titleLC.includes('router unlocking service');
      const isPermanentUnlockSvc = pid === 'svc2' || titleLC.includes('permanent unlock service');

      const detailsHtml =
        isDialogCat6 ? `
          <div class="product-details">
            <p>🔓 Unlocked – All SIM Supported (Dialog / Mobitel / Airtel / Hutch)</p>
            <p>📶 Bands: 3 / 8 / 40</p>
            <p>🚀 Speed: Up to 300Mbps (4G+ LTE)</p>
            <p>🔌 Ports:</p>
            <ul><li>4× LAN Ports</li><li>1× Voice Port (Call Support via SIM)</li></ul>
            <ul class="check-list"><li>✅ Wi‑Fi router + Ethernet support</li><li>✅ Office/CCTV/Smart TV</li><li>✅ Fast & Stable</li></ul>
            <p>🆕 Original Product • 🚚 COD Available • 📞 078 68000 86</p>
          </div>
        `
      : isZLT ? `
          <div class="product-details">
            <p>🔰 Any sim working • 🔰 4G high speed</p>
            <p>Cat 4 150 Mbps • 6 Months Warranty</p>
            <p>📦 COD • 🚚 Islandwide • ♨️ Rs.8900/-</p>
            <p>📱 Call/WhatsApp: 078 680 0086</p>
          </div>
        `
      : isS12Pro ? `
          <div class="product-details">
            <ul class="check-list">
              <li>⭕ Any sim working</li><li>⭕ Cat 6 4G+ Router</li><li>⭕ 300mbps</li>
              <li>⭕ Bands: 1 , 3 , 5 , 8 , 38 , 41</li><li>⭕ Island wide delivery</li>
              <li>⭕ Cash on delivery / deposit</li><li>⭕ 3 months warranty♨</li>
            </ul>
            <p>♨️ Rs.14590/- • WhatsApp: 078 68000 86</p>
          </div>
        `
      : isSLT818H ? `
          <div class="product-details">
            <p>🚀 CAT6 4G+ Up to 300Mbps • 📡 Dual External Antennas</p>
            <p>📶 Band 40 • 🌐 Wi‑Fi + LAN • 🆕 Used A Grade</p>
            <ul><li>✔️ Zoom/YouTube/Online Work</li><li>✔️ Long-range Wi‑Fi</li><li>✔️ Smart Home</li></ul>
            <p>💰 Rs. 4,990/- • 🚚 COD • 📞 078 68000 86</p>
          </div>
        `
      : isViuHub ? `
          <div class="product-details">
            <ul class="check-list">
              <li>✅ TV එක Smart TV එකක් කරන්න පුලුවන්!</li>
              <li>✅ YouTube, IPTV, Facebook, WhatsApp, Chrome, Games 🎮</li>
              <li>✅ Phone එක TV එකට Mirror (Casting)</li>
              <li>✅ TV බලන්නත් පුලුවන්! 📡</li>
              <li>✅ Antenna Dish ඕනේ නැ • ✅ Google Play Store</li>
            </ul>
            <p>📦 Islandwide • 💵 COD • 📲 078 680 0086</p>
          </div>
        `
      : isViuRemote ? `
          <div class="product-details">
            <p>Original Quality Replacement Remote (VIU Mini / Dialog TV Hub)</p>
            <ul><li>🔸 Plug & Play</li><li>🔸 High Quality Buttons</li><li>🔸 AAA x2</li><li>🔸 TV + VIU Control</li></ul>
            <p>💥 Rs.990/- • 📦 COD • 📲 078 680 0086</p>
          </div>
        `
      : isDialogZeroSIM ? `
          <div class="product-details">
            <p>💥 Rs.3900/- (wholesale discounts available)</p>
            <p>📦 Islandwide • 💵 COD • 📲 078 680 0086</p>
            <p>🆓 Zero Rental SIM (Viu Hub/Mini) • No bill • No reload • With VPN: apps usage OK</p>
          </div>
        `
      : isSLTPrePostSIM ? `
          <div class="product-details">
            <p>SLT Prepaid Rs.1000/= • Postpaid: 12AM–7AM free data</p>
            <p>6 months පස්සේ Prepaid එකකට switch කරගන්න පුළුවන්</p>
            <p>යවන්න: නම / ලිපිනය / දුරකථන / NIC</p>
            <p>📲 078 680 0086</p>
          </div>
        `
      : isBatteryZ2600 ? `
          <div class="product-details">
            <ul class="check-list"><li>✅ Model: Z2600 • 2600mAh</li><li>✅ For S10 / S20 / M60</li><li>✅ Long backup • Rechargeable</li></ul>
            <p>♨️ Rs.990/- • 📦 COD • 📲 078 680 0086</p>
          </div>
        `
      : isAAABattery ? `
          <div class="product-details">
            <p>✅ TV Remote / Router / Mouse / Keyboard / Toys / Gadgets</p>
            <ul class="check-list"><li>🟢 Fresh Stock</li><li>🟢 Long Lasting</li><li>🟢 Reliable</li></ul>
            <p>📦 2 pcs from Rs.190/- • Wholesale packs • 🚚 COD • 📲 078 680 0086</p>
          </div>
        `
      : isRouterUnlockSvc ? `
          <div class="product-details">
            <p>🔓 Normal mobile SIM එකක් දාලා අඩු මුදලට internet!</p>
            <p>🔰 අඩු මුදලකට router unlock කර high speed internet</p>
            <p>🤝 Online remotely unlock කර ගන්න පුළුවන්</p>
          </div>
        `
      : isPermanentUnlockSvc ? `
          <div class="product-details">
            <p>Internet connection/Signal අවුලක් 있ද? 😇</p>
            <p>ඔබගේ location එකට හොඳම router එක තෝරා දෙමු 🤝</p>
            <p>වගකීම සමඟ any-SIM routers • ඔබගේ router unlock 🔓</p>
            <p>WhatsApp: 078 68000 86</p>
          </div>
        `
      : `<p class="mt-3 text-muted">ඔඩර්/වැඩි විස්තර: <a href="tel:0786800086">078 680 0086</a></p>`;

      root.innerHTML = `
        <div class="row g-4 align-items-start">
          <div class="col-md-6">
            <div class="card">
              <img src="${img}" alt="${item.title}" class="thumb"
                   onerror="this.onerror=null;this.src='https://via.placeholder.com/900x560?text=Image';">
            </div>
          </div>
          <div class="col-md-6">
            <h2 class="mb-2">${item.title||''}</h2>
            <div class="mb-3">
              ${priceMarkup}
              <span class="chip" style="border-color:${tagColor}; color:#fff; background:rgba(255,255,255,0.05)">${cat}</span>
            </div>
            <div class="d-flex flex-wrap gap-2">
              <a href="#" id="buyNowBtn" class="btn btn-danger">Buy Now</a>
              <a href="${waHref}" target="_blank" class="btn" style="background:#25D366;color:#fff;">WhatsApp</a>
            </div>
            ${detailsHtml}
            <p class="mt-1"><a href="index.html#sell-items">&larr; Back to Products</a></p>
          </div>
        </div>
      `;

      // Modal open + prefill
      const modalEl = document.getElementById('buyModal');
      const buyBtn  = document.getElementById('buyNowBtn');
      const productTitle = document.getElementById('productTitle');
      const productPrice = document.getElementById('productPrice');
      const productId    = document.getElementById('productId');

      buyBtn.addEventListener('click', (e)=>{
        e.preventDefault();
        productTitle.value = item.title || '';
        productPrice.value = price > 0 ? `LKR ${price.toFixed(2)}` : 'Contact for price';
        productId.value    = item.id || '';
        const modal = new bootstrap.Modal(modalEl);
        modal.show();
      });

      // Send via Gmail (fallback to mailto)
      const orderForm = document.getElementById('orderForm');
      orderForm.addEventListener('submit', function(e){
        e.preventDefault();

        const toEmail = 'smartzonelk101@gmail.com'; // change if needed
        const name  = (document.getElementById('custName').value || '').trim();
        const wa    = (document.getElementById('custWhatsapp').value || '').trim();
        const pay   = document.getElementById('paymentMethod').value || '';
        const notes = (document.getElementById('custNotes').value || '').trim();

        const subject = `New Order: ${item.title || 'Product'} | ${pay}`;
        const lines = [
          '🧾 Smart Zone — New Order',
          '',
          'Product Details',
          `• Title: ${item.title || ''}`,
          `• ID: ${item.id || ''}`,
          `• Category: ${cat || ''}`,
          `• Price: ${price > 0 ? ('LKR ' + price.toFixed(2)) : 'Contact for price'}`,
          `• URL: ${location.href}`,
          '',
          'Customer',
          `• Name: ${name}`,
          `• WhatsApp: ${wa}`,
          `• Payment Method: ${pay}`,
          notes ? `• Notes: ${notes}` : '',
          '',
          '—',
          new Date().toLocaleString()
        ].filter(Boolean);
        const body = lines.join('\n');

        const gmailURL = 'https://mail.google.com/mail/?view=cm&fs=1&tf=1'
          + '&to='   + encodeURIComponent(toEmail)
          + '&su='   + encodeURIComponent(subject)
          + '&body=' + encodeURIComponent(body);

        // Try open Gmail compose in new tab
        const w = window.open(gmailURL, '_blank');

        // If popup blocked, fallback to mailto:
        if(!w || w.closed || typeof w.closed === 'undefined'){
          const mailtoURL = 'mailto:' + encodeURIComponent(toEmail)
            + '?subject=' + encodeURIComponent(subject)
            + '&body='    + encodeURIComponent(body);
          window.location.href = mailtoURL;
        }

        // Close modal
        const modal = bootstrap.Modal.getInstance(modalEl);
        if(modal){ modal.hide(); }
      });

    })();
  </script>

  <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
